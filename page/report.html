<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan</title>

    <link rel="stylesheet"
href="../css/style.css">

</head>
<body>
     <!-- BUTTON MENU -->
<div class="app-wrapper">
   <button class="menu-btn" id="menuBtn">
☰
</button>
  <div id="sidebar-container"></div>
  <div class="content">

    <div id="toolbar"></div>

    <h2 id="pageTitle">LAPORAN INBOUND & OUTBOUND PAKET</h2>

   <div class="report-page">

    <div class="report-card">

        <div class="report-header shopee">
            Shopee Report
        </div>

        <table class="report-table">
            <tbody>

                <tr>
                    <td>Pesanan Masuk</td>
                    <td id="shopee-masuk">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dikirim</td>
                    <td id="shopee-dikirim">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dibatalkan</td>
                    <td id="shopee-batal">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dikembalikan</td>
                    <td id="shopee-retur">0</td>
                </tr>

                <tr>
                    <td>Pesanan Ditolak</td>
                    <td id="shopee-rejected">0</td>
                </tr>

            </tbody>
        </table>

    </div>

    <div class="report-card">

        <div class="report-header tiktok">
            TikTok Shop Report
        </div>

        <table class="report-table">
            <tbody>

                <tr>
                    <td>Pesanan Masuk</td>
                    <td id="tiktok-masuk">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dikirim</td>
                    <td id="tiktok-dikirim">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dibatalkan</td>
                    <td id="tiktok-batal">0</td>
                </tr>

                <tr>
                    <td>Pesanan Dikembalikan</td>
                    <td id="tiktok-retur">0</td>
                </tr>

                <tr>
                    <td>Pesanan Ditolak</td>
                    <td id="tiktok-rejected">0</td>
                </tr>

            </tbody>
        </table>

    </div>

</div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/toolbar.js"></script>
<script src="../js/summary.js"></script>
<script src="../js/expedisi.js"></script>
<script src="../js/detectexpedisi.js"></script>
<script src="../js/filterstate.js"></script>
<script src="../js/pagination.js"></script>
<script src="../js/report.js"></script>
