<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Scan AWB</title>

<link rel="stylesheet"
href="../css/style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<button class="menu-btn" id="menuBtn">
☰
</button>
<div class="app-wrapper">
<div id="sidebar-container"></div>
  <div class="content">

    <h3>Scan AWB Paket</h3>

    <div>

      <button onclick="setMode('RETUR')">
        RETUR
      </button>

      <button onclick="setMode('CANCEL')">
        CANCEL
      </button>

      <button onclick="runRejectedSyncBatch()">Sync Rejected</button>

    </div>

    <h4>
      Mode Aktif:
      <span id="mode">RETUR</span>
    </h4>

    <h4>
      Total:
      <span id="total">0</span>
    </h4>

    <div id="warning"></div>

    <div id="reader"></div>

    <hr>

    <div id="debug" style="
  margin-top:10px;
  font-size:12px;
  background:#111;
  color:#0f0;
  padding:10px;
  height:150px;
  overflow:auto;
"></div>

    <div id="list"></div>

    <button onclick="sendData()">
      Kirim Semua
    </button>

    <button onclick="clearAll()">
      Hapus Semua
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/config.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/rejectedengine.js"></script>
<script src="../js/scan.js"></script>

</body>
</html>
