<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>
<!-- Bootstrap -->

href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"> -->

<!-- AdminLTE -->

href="../dist/css/adminlte.min.css"> -->

<!-- CSS buatan sendiri -->
 <link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="app-wrapper">
 <button class="menu-btn" id="menuBtn">
☰
</button>
  <div id="sidebar-container"></div>
  <!-- CONTENT -->
  <div class="content">

    <h2>Dashboard Monitoring Pesanan</h2>

    <!-- CARDS -->
    <div class="cards">

      <div class="card totalPerjalanan">

        <h3>Total Retur</h3>

        <h1 id="totalPerjalanan">
          0
        </h1>

      </div>

      <div class="card totalTiba">

        <h3>Sudah Tiba</h3>

        <h1 id="totalTiba">
          0
        </h1>

      </div>

      <div class="card belumTiba">

        <h3>Belum Tiba</h3>

        <h1 id="belumTiba">
          0
        </h1>

      </div>

    </div>

    <!-- SEARCH -->
    <div class="search">

      <input
      type="text"
      id="searchInput"
      placeholder="Cari resi...">

      <button onclick="globalSearch()">
        Cari
      </button>

    </div>

    <!-- TABLE -->
    <table>

      <thead>

        <tr>
          <th>Resi</th>
          <th>Expedisi</th>
          <th>Sumber</th>
          <th>Status</th>
          <th>Waktu</th>
        </tr>

      </thead>

      <tbody id="tableBody">

      </tbody>

    </table>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/sidebar.js"></script>
<!-- <script src="../js/Gscript.js"></script> -->

<script src="../js/config.js"></script>

<script src="../js/search.js"></script>

<script src="../js/index.js"></script>

src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->

</body>
</html>
