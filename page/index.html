<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>MENU</h2>

    <a href="../page/scan.html">
      Scan

    <a href="../page/index.html">

    <a href="../page/manifest.html">

  <!-- CONTENT -->
  <div class="content">

    <h2>Dashboard</h2>
    
<input
  type="text"
  id="searchInput"
  placeholder="Cari resi..."
>

<button onclick="globalSearch()">
  Cari
</button>
<table>

  <thead>
    <tr>
      <th>Resi</th>
      <th>Sumber</th>
      <th>Status / Waktu</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>

</table>

    <div class="cards">

      <div class="card Total Retur">

        <h3>Total Retur</h3>

        <h1 id="totalPerjalanan">
          0
        </h1>

      </div>

      <div class="card sudah tiba">

        <h3>Sudah Tiba</h3>

        <h1 id="totalTiba">
          0
        </h1>

      </div>

      <div class="card belum tiba">

        <h3>Belum Tiba</h3>

        <h1 id="belumTiba">
          0
        </h1>

      </div>

    </div>

  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/config.js"></script>
<script src="../js/search.js"></script>

</body>
